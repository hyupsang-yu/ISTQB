const STORAGE_KEY="istqb_v2";
function load(){try{const d=localStorage.getItem(STORAGE_KEY);return d?JSON.parse(d):{}}catch{return{}}}
function save(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}catch{}}

function buildQuiz(day){
  const today=QUIZ_BANK.filter(q=>q.day===day);
  const prev=QUIZ_BANK.filter(q=>q.day<day&&q.day>=Math.max(1,day-3));
  const shuffled=[...prev].sort(()=>Math.random()-0.5).slice(0,3);
  return [...today,...shuffled].sort(()=>Math.random()-0.5);
}

const CH_COLOR={
  "1장":"#6366f1","2장":"#0ea5e9","3장":"#10b981",
  "4장":"#f59e0b","5장":"#ef4444","6장":"#8b5cf6","복습":"#6b7280","전체":"#6b7280"
};

export default function App(){
  const [progress,setProgress]=useState(load);
  const [view,setView]=useState("home");
  const [day,setDay]=useState(null);
  const [quiz,setQuiz]=useState(null);
  const [qi,setQi]=useState(0);
  const [sel,setSel]=useState(null);
  const [answers,setAnswers]=useState([]);

  const updateP=(p)=>{setProgress(p);save(p)};
  const done=Object.keys(progress).filter(d=>progress[d]?.studied).length;
  const cur=day?CURRICULUM[day-1]:null;
  const dayP=day?progress[day]||{}:{};

  function startQuiz(d){
    setQuiz(buildQuiz(d));setQi(0);setSel(null);setAnswers([]);setView("quiz");
  }
  function handleAns(i){if(sel!==null)return;setSel(i);}
  function next(){
    const a=[...answers,{q:quiz[qi],sel}];
    if(qi+1>=quiz.length){
      setAnswers(a);
      const score=a.filter(x=>x.sel===x.q.ans).length;
      const p={...progress,[day]:{studied:true,score,total:quiz.length,date:new Date().toLocaleDateString("ko-KR")}};
      updateP(p);setView("result");
    } else {
      setAnswers(a);setQi(qi+1);setSel(null);
    }
  }

  const s={
    wrap:{maxWidth:480,margin:"0 auto",padding:"0 0 80px",fontFamily:"-apple-system,sans-serif",background:"#f8fafc",minHeight:"100vh"},
    hdr:{background:"#fff",padding:"14px 16px",borderBottom:"1px solid #e2e8f0",position:"sticky",top:0,zIndex:10},
    card:{background:"#fff",borderRadius:12,padding:"14px",margin:"0 12px 8px",boxShadow:"0 1px 3px rgba(0,0,0,0.07)"},
    btn:(c="#6366f1")=>({background:c,color:"#fff",border:"none",borderRadius:10,padding:"13px",fontSize:14,fontWeight:600,cursor:"pointer",width:"100%"}),
    tag:(c)=>({background:c+"20",color:c,fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:20}),
  };

  if(view==="home") return(
    <div style={s.wrap}>
      <div style={s.hdr}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <p style={{fontSize:11,color:"#94a3b8",margin:0}}>ISTQB CTFL 시험 대비</p>
            <h1 style={{fontSize:19,fontWeight:700,margin:0,color:"#1e293b"}}>30일 학습 플랜</h1>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:24,fontWeight:700,color:"#6366f1"}}>{done}<span style={{fontSize:13,color:"#94a3b8"}}>/30</span></div>
            <div style={{fontSize:11,color:"#94a3b8"}}>완료</div>
          </div>
        </div>
        <div style={{height:5,background:"#e2e8f0",borderRadius:3,marginTop:8,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${(done/30)*100}%`,background:"#6366f1",borderRadius:3}}/>
        </div>
      </div>
      <div style={{padding:"10px 12px"}}>
        {CURRICULUM.map(c=>{
          const d2=progress[c.day]?.studied;
          const col=CH_COLOR[c.chapter]||"#6b7280";
          return(
            <div key={c.day} onClick={()=>{setDay(c.day);setView("study");}}
              style={{display:"flex",alignItems:"center",gap:10,background:"#fff",borderRadius:10,padding:"11px 13px",marginBottom:7,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",cursor:"pointer",borderLeft:`4px solid ${d2?col:"#e2e8f0"}`}}>
              <div style={{width:30,height:30,borderRadius:"50%",background:d2?col:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {d2?<span style={{color:"#fff",fontSize:15}}>✓</span>:<span style={{fontSize:12,fontWeight:700,color:"#94a3b8"}}>{c.day}</span>}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:600,color:"#1e293b",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.title}</div>
                <div style={{display:"flex",gap:5,marginTop:2,alignItems:"center"}}>
                  <span style={s.tag(col)}>{c.chapter}</span>
                  {d2&&<span style={{fontSize:11,color:"#94a3b8"}}>퀴즈 {progress[c.day].score}/{progress[c.day].total}</span>}
                </div>
              </div>
              <span style={{color:"#cbd5e1",fontSize:18}}>›</span>
            </div>
          );
        })}
      </div>
    </div>
  );

  if(view==="study"&&cur) return(
    <div style={s.wrap}>
      <div style={s.hdr}>
        <button onClick={()=>setView("home")} style={{background:"none",border:"none",cursor:"pointer",color:"#6366f1",fontSize:14,padding:0,fontWeight:600}}>← 목록으로</button>
        <div style={{marginTop:6,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <span style={s.tag(CH_COLOR[cur.chapter])}>{cur.chapter} · Day {cur.day}</span>
            <h2 style={{fontSize:17,fontWeight:700,margin:"5px 0 0",color:"#1e293b"}}>{cur.title}</h2>
          </div>
          {dayP.studied&&<span style={{fontSize:20}}>✅</span>}
        </div>
      </div>
      <div style={{padding:"12px"}}>
        <div style={{...s.card,margin:"0 0 8px",background:"#f0f4ff",border:"1px solid #c7d2fe"}}>
          <p style={{fontSize:13,color:"#4338ca",lineHeight:1.7,margin:0}}>{cur.summary}</p>
        </div>
        <div style={{...s.card,margin:"0 0 8px"}}>
          <h3 style={{fontSize:14,fontWeight:700,color:"#1e293b",marginBottom:8}}>📚 오늘의 학습 주제</h3>
          {cur.topics.map((t,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:i<cur.topics.length-1?"1px solid #f1f5f9":"none"}}>
              <div style={{width:18,height:18,borderRadius:"50%",background:CH_COLOR[cur.chapter]+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{fontSize:9,fontWeight:700,color:CH_COLOR[cur.chapter]}}>{i+1}</span>
              </div>
              <span style={{fontSize:13,color:"#374151"}}>{t}</span>
            </div>
          ))}
        </div>
        {cur.day>1&&(
          <div style={{...s.card,margin:"0 0 8px",background:"#fefce8",border:"1px solid #fde68a"}}>
            <p style={{fontSize:13,color:"#92400e",margin:0}}>🔄 퀴즈에서 Day {Math.max(1,cur.day-3)}~{cur.day-1} 내용도 함께 출제되어 자연스럽게 복습됩니다!</p>
          </div>
        )}
        <button onClick={()=>startQuiz(cur.day)} style={s.btn()}>
          {dayP.studied?"🔁 다시 퀴즈 풀기":"📝 학습 완료 & 퀴즈 시작"}
        </button>
        {dayP.studied&&<div style={{textAlign:"center",marginTop:8,fontSize:13,color:"#6b7280"}}>마지막 퀴즈: {dayP.score}/{dayP.total} 정답 · {dayP.date}</div>}
      </div>
    </div>
  );

  if(view==="quiz"&&quiz){
    const q=quiz[qi];
    return(
      <div style={s.wrap}>
        <div style={s.hdr}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <button onClick={()=>setView("study")} style={{background:"none",border:"none",cursor:"pointer",color:"#6366f1",fontSize:14,padding:0,fontWeight:600}}>← 학습으로</button>
            <span style={{fontSize:13,color:"#94a3b8"}}>{qi+1} / {quiz.length}</span>
          </div>
          <div style={{height:4,background:"#e2e8f0",borderRadius:2,marginTop:7,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${((qi+1)/quiz.length)*100}%`,background:"#6366f1",borderRadius:2}}/>
          </div>
        </div>
        <div style={{padding:"12px"}}>
          <div style={{marginBottom:7}}>
            <span style={s.tag(q.day===day?CH_COLOR[CURRICULUM[q.day-1]?.chapter]:"#6b7280")}>
              {q.day===day?`Day ${q.day} 오늘`:`Day ${q.day} 복습`}
            </span>
          </div>
          <div style={{...s.card,margin:"0 0 10px",background:"#f8fafc"}}>
            <p style={{fontSize:15,fontWeight:600,color:"#1e293b",lineHeight:1.6,margin:0}}>Q{qi+1}. {q.q}</p>
          </div>
          {q.opts.map((opt,i)=>{
            let bg="#fff",border="1px solid #e2e8f0",color="#374151";
            if(sel!==null){
              if(i===q.ans){bg="#f0fdf4";border="2px solid #22c55e";color="#166534";}
              else if(i===sel&&sel!==q.ans){bg="#fef2f2";border="2px solid #ef4444";color="#991b1b";}
            }
            return(
              <div key={i} onClick={()=>handleAns(i)} style={{background:bg,border,borderRadius:10,padding:"13px",marginBottom:7,cursor:sel===null?"pointer":"default",color,fontSize:14,lineHeight:1.5}}>
                <span style={{fontWeight:600,marginRight:7}}>{["①","②","③","④"][i]}</span>{opt}
                {sel!==null&&i===q.ans&&<span style={{marginLeft:6}}>✓</span>}
                {sel!==null&&i===sel&&sel!==q.ans&&<span style={{marginLeft:6}}>✗</span>}
              </div>
            );
          })}
          {sel!==null&&(
            <div style={{background:sel===q.ans?"#f0fdf4":"#fef2f2",border:`1px solid ${sel===q.ans?"#86efac":"#fca5a5"}`,borderRadius:10,padding:"11px",marginBottom:10}}>
              <p style={{fontSize:14,fontWeight:700,color:sel===q.ans?"#166534":"#991b1b",margin:"0 0 3px"}}>{sel===q.ans?"🎉 정답!":"❌ 오답"}</p>
              <p style={{fontSize:13,color:"#374151",margin:0}}>정답: {["①","②","③","④"][q.ans]} {q.opts[q.ans]}</p>
            </div>
          )}
          {sel!==null&&<button onClick={next} style={s.btn()}>{qi+1>=quiz.length?"결과 보기":"다음 문제 →"}</button>}
        </div>
      </div>
    );
  }

  if(view==="result"){
    const score=answers.filter(a=>a.sel===a.q.ans).length;
    const total=answers.length;
    const pct=Math.round((score/total)*100);
    const gc=pct>=80?"#22c55e":pct>=60?"#f59e0b":"#ef4444";
    return(
      <div style={s.wrap}>
        <div style={{padding:"24px 12px 12px",textAlign:"center"}}>
          <div style={{fontSize:56,marginBottom:6}}>{pct>=80?"🏆":pct>=60?"👍":"📖"}</div>
          <h2 style={{fontSize:21,fontWeight:700,color:"#1e293b",margin:"0 0 4px"}}>Day {day} 완료!</h2>
          <div style={{fontSize:38,fontWeight:800,color:gc,margin:"6px 0"}}>{score} / {total}</div>
          <span style={{background:gc+"20",color:gc,fontSize:14,fontWeight:700,padding:"3px 14px",borderRadius:20}}>{pct>=80?"우수":pct>=60?"보통":"복습 필요"}</span>
        </div>
        <div style={{padding:"0 12px"}}>
          <div style={s.card}>
            <h3 style={{fontSize:14,fontWeight:700,color:"#1e293b",marginBottom:8}}>문항별 결과</h3>
            {answers.map((a,i)=>{
              const ok=a.sel===a.q.ans;
              return(
                <div key={i} style={{padding:"9px 0",borderBottom:i<answers.length-1?"1px solid #f1f5f9":"none"}}>
                  <div style={{display:"flex",gap:7,alignItems:"flex-start"}}>
                    <span style={{fontSize:15,flexShrink:0}}>{ok?"✅":"❌"}</span>
                    <div style={{flex:1}}>
                      <p style={{fontSize:13,color:"#374151",margin:"0 0 3px",lineHeight:1.5}}>Q{i+1}. {a.q.q}</p>
                      {!ok&&<p style={{fontSize:12,color:"#ef4444",margin:0}}>정답: {a.q.opts[a.q.ans]}</p>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",gap:7,marginTop:8}}>
            <button onClick={()=>startQuiz(day)} style={{...s.btn("#94a3b8"),flex:1}}>다시 풀기</button>
            <button onClick={()=>setView("home")} style={{...s.btn(),flex:1}}>목록으로</button>
          </div>
          {day<30&&<button onClick={()=>{setDay(day+1);setView("study");}} style={{...s.btn("#10b981"),marginTop:7}}>Day {day+1}로 이동 →</button>}
        </div>
      </div>
    );
  }
  return null;
}
</script>
</body>
</html>
