    const CURRICULUM = [
      { day:1,  title:"테스팅이란 무엇인가?", chapter:"1장", topics:["테스팅의 정의","테스트 목적 7가지","베리피케이션 vs 밸리데이션","동적 테스팅 vs 정적 테스팅"], summary:"소프트웨어 테스팅은 결함을 식별하고 소프트웨어 산출물의 품질을 평가하는 일련의 활동입니다. 테스팅은 단순히 소프트웨어를 실행하는 것이 아니라 계획, 모니터링, 분석, 설계, 구현, 실행, 완료 등 다양한 활동을 포함합니다." },
      { day:2,  title:"테스팅과 디버깅", chapter:"1장", topics:["테스팅 vs 디버깅 차이","동적 테스팅의 장애 유발","정적 테스팅의 결함 직접 식별","확인 테스팅과 리그레션 테스팅"], summary:"테스팅과 디버깅은 별개의 활동입니다. 테스팅은 결함을 식별하고, 디버깅은 결함의 원인을 찾아 제거합니다. 디버깅 프로세스: 장애 재현 → 분석(결함 찾기) → 결함 수정." },
      { day:3,  title:"테스팅이 왜 필요한가?", chapter:"1장", topics:["테스팅이 성공에 기여하는 방법","테스팅 vs 품질보증(QA)","오류·결함·장애·근본원인 구분"], summary:"테스팅은 결함을 비용 효율적으로 식별합니다. QA는 프로세스 중심의 예방 접근법, 테스팅은 제품 지향적 교정 접근법입니다. 오류(사람의 실수) → 결함(버그) → 장애(시스템 문제)." },
      { day:4,  title:"테스팅의 7가지 원리", chapter:"1장", topics:["결함 존재 증명","완벽한 테스팅 불가","조기 테스팅","결함 집중","테스트 효과 감소","정황 의존성","결함 부재의 궤변"], summary:"7원리: ①결함 존재 증명 ②완벽한 테스팅 불가 ③조기 테스팅 ④결함 집중(파레토) ⑤살충제 패러독스 ⑥정황 의존적 ⑦결함 부재는 궤변." },
      { day:5,  title:"테스트 활동과 업무", chapter:"1장", topics:["테스트 계획","테스트 모니터링·제어","테스트 분석","테스트 설계","테스트 구현","테스트 실행","테스트 완료"], summary:"테스트 프로세스 7가지: 계획 → 모니터링/제어 → 분석(무엇을?) → 설계(어떻게?) → 구현 → 실행 → 완료. 순차적이 아닌 반복적/병렬로 수행됩니다." },
      { day:6,  title:"테스트웨어와 추적성", chapter:"1장", topics:["테스트웨어 종류","각 활동별 산출물","추적성의 가치","커버리지 조건"], summary:"추적성이란 테스트 베이시스 ↔ 테스트웨어 ↔ 테스트 결과 ↔ 결함 간의 연관성을 유지하는 것으로, 커버리지 평가와 변경 영향 파악에 필수적입니다." },

      { day:8,  title:"SDLC와 테스팅 관계", chapter:"2장", topics:["순차적 개발모델","반복적/점진적 모델","애자일에서의 테스팅","SDLC가 테스팅에 미치는 영향"], summary:"SDLC 모델 선택은 테스트 활동 범위/시기, 문서 수준, 기법/접근법 선택, 자동화 범위에 영향을 줍니다. 애자일은 경량 산출물과 테스트 자동화를 선호합니다." },
      { day:9,  title:"TDD/ATDD/BDD", chapter:"2장", topics:["좋은 테스팅 프랙티스 4가지","TDD","ATDD","BDD(Given/When/Then)"], summary:"TDD: 테스트 먼저 작성 후 코드. ATDD: 인수 조건에서 테스트 도출. BDD: Given/When/Then 형식으로 자연어 테스트 작성. 모두 시프트 레프트 원리를 따릅니다." },
      { day:10, title:"DevOps와 시프트 레프트", chapter:"2장", topics:["DevOps의 테스팅 이점","DevOps 리스크","시프트 레프트 정의","시프트 레프트 프랙티스","회고와 프로세스 개선"], summary:"DevOps는 CI/CD를 통해 빠른 피드백과 리그레션 자동화를 제공합니다. 시프트 레프트는 테스트를 더 일찍 수행하는 접근법입니다." },
      { day:11, title:"테스트 레벨", chapter:"2장", topics:["컴포넌트 테스팅(단위)","컴포넌트 통합 테스팅","시스템 테스팅","시스템 통합 테스팅","인수 테스팅(UAT 등)"], summary:"5가지 테스트 레벨: ①컴포넌트(단위) ②컴포넌트 통합 ③시스템 ④시스템 통합 ⑤인수(UAT, 운영, 계약, 알파/베타)." },
      { day:12, title:"테스트 유형과 확인/리그레션", chapter:"2장", topics:["기능 테스팅","비기능 테스팅(ISO 25010)","블랙박스 테스팅","화이트박스 테스팅","확인 테스팅","리그레션 테스팅"], summary:"기능(무엇을)/비기능(얼마나 잘)/블랙박스(명세 기반)/화이트박스(구조 기반). 확인 테스팅은 결함 수정 확인, 리그레션 테스팅은 변경으로 인한 부정적 영향 확인." },
      { day:13, title:"유지보수 테스팅", chapter:"2장", topics:["유지보수 범주","유지보수 테스팅 범위 결정 요소","유지보수 테스팅 계기 3가지"], summary:"유지보수 테스팅 계기: ①수정사항(릴리스, 핫픽스) ②운영환경 업그레이드/마이그레이션 ③단종. 범위는 변경 리스크 수준, 기존 시스템 크기, 변경사항 크기로 결정됩니다." },
      { day:14, title:"1·2장 복습 및 정리", chapter:"복습", topics:["1장 핵심 정리","2장 핵심 정리","주요 용어 복습"], summary:"테스팅의 기초와 SDLC 전반 복습. 특히 7가지 원리, 테스트 레벨, 테스트 유형의 차이를 확실히 구분할 수 있어야 합니다." },
      { day:15, title:"정적 테스팅 기초", chapter:"3장", topics:["정적 테스팅 정의","검사 가능한 작업 산출물","정적 테스팅의 가치","정적 vs 동적 테스팅 차이"], summary:"정적 테스팅은 소프트웨어를 실행하지 않고 평가합니다. 동적 테스팅보다 더 저렴하게 결함 식별 가능. 비-실행 산출물에도 적용 가능합니다." },
      { day:16, title:"피드백과 리뷰 프로세스", chapter:"3장", topics:["조기 피드백의 이점","리뷰 프로세스 5단계","리뷰에서의 역할과 책임"], summary:"리뷰 프로세스: 계획 → 리뷰 착수 → 개별 리뷰 → 논의/분석 → 수정/보고. 역할: 관리자/저자/중재자/서기/리뷰어/리뷰 리더." },
      { day:17, title:"리뷰 유형과 성공 요소", chapter:"3장", topics:["비공식 리뷰","워크쓰루","기술 리뷰","인스펙션","리뷰 성공 요소"], summary:"리뷰 유형(공식성 순): 비공식 → 워크쓰루(저자 리드) → 기술 리뷰(중재자 리드) → 인스펙션(가장 공식적, 최대 결함 발견, 메트릭 수집)." },
      { day:18, title:"블랙박스 기법 - 동등분할/경계값", chapter:"4장", topics:["동등 분할(EP) 개념","유효/비유효 분할","이치 초이스 커버리지","경계값 분석(BVA)","2값 vs 3값 경계값"], summary:"동등분할: 같은 분할의 값은 동일하게 처리됨. 경계값 분석: 2값(경계값+인접값), 3값(경계값+양쪽 이웃값). 3값이 더 엄격합니다." },
      { day:19, title:"블랙박스 기법 - 결정테이블/상태전이", chapter:"4장", topics:["결정 테이블 구조","제한입력 vs 확장입력","상태 전이 다이어그램","상태 테이블","3가지 커버리지 기준"], summary:"결정 테이블: 조건 조합별 동작 결과 정리. 상태 전이 커버리지: ①모든 상태 ②유효 전이(0-스위치) ③모든 전이(유효+비유효). 강도: ① < ② < ③." },
      { day:20, title:"화이트박스 기법", chapter:"4장", topics:["구문 테스팅과 구문 커버리지","분기 테스팅과 분기 커버리지","분기 커버리지 > 구문 커버리지","화이트박스 테스팅의 가치와 한계"], summary:"구문 커버리지: 실행 구문/전체 구문. 분기 커버리지: 실행 분기/전체 분기. 100% 분기 달성 시 구문 커버리지도 달성(역은 성립 안 함)." },
      { day:21, title:"경험 기반 기법", chapter:"4장", topics:["오류 추정(결함 공격)","탐색적 테스팅(세션 기반)","체크리스트 기반 테스팅"], summary:"오류 추정: 테스터 경험으로 결함 예측. 탐색적 테스팅: 설계/실행/평가 동시 수행, 테스트 차터 사용. 체크리스트 기반: 경험 기반 체크리스트로 테스트." },
      { day:22, title:"협업 기반 테스트 접근법", chapter:"4장", topics:["사용자 스토리 3C","INVEST 기준","인수 조건 작성법","ATDD 프로세스"], summary:"사용자 스토리 INVEST: Independent/Negotiable/Valuable/Estimable/Small/Testable. 인수 조건: 시나리오 기반(Given/When/Then) 또는 규칙 기반." },
      { day:23, title:"테스트 계획", chapter:"5장", topics:["테스트 계획서 목적과 내용","릴리스/반복 주기 계획 기여","시작 조건(Entry) vs 완료 조건(Exit)","완료의 정의(DoD)"], summary:"테스트 계획서 주요 내용: 테스팅 정황/가정/제약, 이해관계자, 의사소통, 리스크 목록, 테스트 접근법, 예산/일정." },
      { day:24, title:"테스트 추정 기법", chapter:"5장", topics:["비율 기반 추정","외삽법","와이드밴드 델파이/플래닝 포커","3점 추정 공식 E=(a+4m+b)/6"], summary:"추정 기법 4가지: ①비율 기반 ②외삽법(반복적 SDLC 적합) ③와이드밴드 델파이(전문가 합의) ④3점 추정(낙관/확률/비관, SD=(b-a)/6)." },
      { day:25, title:"테스트 우선순위와 피라미드/사분면", chapter:"5장", topics:["리스크/커버리지/요구사항 기반 우선순위","테스트 피라미드 개념","테스팅 사분면 4가지"], summary:"피라미드: 하층(많고 빠른 단위 테스트) → 상층(적고 느린 E2E). 사분면: Q1(기술/팀지원) Q2(비즈니스/팀지원) Q3(비즈니스/제품평가) Q4(기술/제품평가)." },
      { day:26, title:"리스크 관리", chapter:"5장", topics:["리스크 정의(발생가능성×영향)","프로젝트 리스크 vs 제품 리스크","제품 리스크 분석(식별+평가)","제품 리스크 제어(완화+모니터링)"], summary:"리스크 수준 = 발생 가능성 × 영향. 프로젝트 리스크(조직/인력/기술/공급업체)와 제품 리스크(품질 특성) 구분. 리스크 기반 테스팅으로 우선순위 결정." },
      { day:27, title:"테스트 모니터링·제어·완료", chapter:"5장", topics:["테스트 메트릭 종류","테스트 진행 보고서 내용","테스트 완료 보고서 내용","테스팅 상황 전달 방법"], summary:"주요 메트릭: 프로젝트/테스트 진행/제품 품질/결함/리스크/커버리지/비용. 진행 보고서는 정기적, 완료 보고서는 레벨 종료 시 작성." },

      {day:28,q:"결함 보고서에 반드시 포함되어야 할 내용이 아닌 것은?",opts:["고유 식별자와 제목","기대 결과와 실제 결과","결함을 수정한 개발자의 이름","결함의 심각도와 수정 우선순위"],ans:2},

      {day:29,q:"테스트 자동화의 효과로 옳은 것은?",opts:["모든 결함을 자동으로 발견한다","반복적 수작업을 줄여 시간을 절약하고 일관성 및 재현성을 향상시킨다","수동 테스팅이 완전히 불필요해진다","코드 품질이 자동으로 향상된다"],ans:1},
      {day:29,q:"테스트 자동화의 잠재적 리스크로 올바르지 않은 것은?",opts:["도구 효과에 대한 비현실적인 기대","도구에 지나치게 의존하여 비판적 사고 무시","반복적 수작업 감소로 인한 시간 절약","오픈소스 소프트웨어의 지원 중단 가능성"],ans:2},
      {day:30,q:"ISTQB CTFL에서 정의한 테스트 레벨의 수는?",opts:["3가지","4가지","5가지","6가지"],ans:2},

      {day:30,q:"4가지 리뷰 유형을 공식성 순서대로 올바르게 나열한 것은?",opts:["인스펙션 > 기술 리뷰 > 워크쓰루 > 비공식 리뷰","비공식 리뷰 > 기술 리뷰 > 워크쓰루 > 인스펙션","기술 리뷰 > 인스펙션 > 워크쓰루 > 비공식 리뷰","워크쓰루 > 비공식 리뷰 > 기술 리뷰 > 인스펙션"],ans:0},
      {day:30,q:"리스크 기반 테스팅의 정의로 옳은 것은?",opts:["리스크가 없는 영역만 테스트하는 접근법","리스크 분석과 리스크 제어를 기반으로 테스트 활동을 선택하고 우선순위를 정해 관리하는 접근법","모든 테스트를 동등하게 수행하는 접근법","리스크가 높은 영역을 나중에 테스트하는 접근법"],ans:1},
    ];

    const CH_COLOR = {"1장":"#6366f1","2장":"#0ea5e9","3장":"#10b981","4장":"#f59e0b","5장":"#ef4444","6장":"#8b5cf6","복습":"#64748b","전체":"#64748b"};
    const NUM = ["①","②","③","④"];

    function App() {
      const [progress, setProgress] = useState({});
      const [view, setView] = useState("home");
      const [selectedDay, setSelectedDay] = useState(null);
      const [quizState, setQuizState] = useState(null);
      const [currentQ, setCurrentQ] = useState(0);
      const [selected, setSelected] = useState(null);
      const [answers, setAnswers] = useState([]);

      const completedDays = Object.values(progress).filter(p => p?.studied).length;
      const cur = selectedDay ? CURRICULUM[selectedDay - 1] : null;
      const dayProg = selectedDay ? (progress[selectedDay] || {}) : {};

      function buildQuiz(day) {
        const todayQs = QUIZ_BANK.filter(q => q.day === day);
        const prevQs = QUIZ_BANK.filter(q => q.day < day && q.day >= Math.max(1, day - 3))
          .sort(() => Math.random() - 0.5).slice(0, 3);
        return [...todayQs, ...prevQs].sort(() => Math.random() - 0.5).slice(0, 8);
      }

      function startQuiz(day) {
        setQuizState(buildQuiz(day));
        setCurrentQ(0);
        setSelected(null);
        setAnswers([]);
        setView("quiz");
      }

      function handleAnswer(idx) {
        if (selected !== null) return;
        setSelected(idx);
      }

      function nextQuestion() {
        const newAnswers = [...answers, { q: quizState[currentQ], selected }];
        if (currentQ + 1 >= quizState.length) {
          const score = newAnswers.filter(a => a.selected === a.q.ans).length;
          setProgress(p => ({ ...p, [selectedDay]: { studied: true, quizScore: score, quizTotal: quizState.length } }));
          setAnswers(newAnswers);
          setView("result");
        } else {
          setAnswers(newAnswers);
          setCurrentQ(currentQ + 1);
          setSelected(null);
        }
      }

      // ─── HOME ───────────────────────────────────
      if (view === "home") return (
        <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",paddingBottom:40}}>
          <div style={{background:"#fff",padding:"20px 16px 16px",position:"sticky",top:0,zIndex:10,boxShadow:"0 1px 0 #e2e8f0"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontSize:11,color:"#94a3b8",fontWeight:600,letterSpacing:1}}>ISTQB CTFL</div>
                <div style={{fontSize:20,fontWeight:800,color:"#0f172a",marginTop:2}}>30일 학습 플랜</div>
              </div>
              <div style={{textAlign:"right",background:"#f8faff",borderRadius:12,padding:"8px 14px"}}>
                <div style={{fontSize:26,fontWeight:800,color:"#6366f1",lineHeight:1}}>{completedDays}<span style={{fontSize:13,color:"#cbd5e1",fontWeight:400}}>/30</span></div>
                <div style={{fontSize:10,color:"#94a3b8"}}>일 완료</div>
              </div>
            </div>
            <div style={{height:6,background:"#f1f5f9",borderRadius:3,marginTop:12,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${(completedDays/30)*100}%`,background:"linear-gradient(90deg,#6366f1,#8b5cf6)",borderRadius:3,transition:"width 0.4s"}} />
            </div>
          </div>

          <div style={{padding:"12px 16px 8px",display:"flex",gap:6,flexWrap:"wrap"}}>
            {[["1장","#6366f1","기초"],["2장","#0ea5e9","SDLC"],["3장","#10b981","정적"],["4장","#f59e0b","기법"],["5장","#ef4444","관리"],["6장","#8b5cf6","도구"]].map(([ch,col,name])=>(
              <span key={ch} style={{fontSize:11,fontWeight:700,padding:"3px 9px",borderRadius:20,background:col+"18",color:col}}>{ch} {name}</span>
            ))}
          </div>

          <div style={{padding:"0 12px"}}>
            {CURRICULUM.map(c2 => {
              const done = progress[c2.day]?.studied;
              const col = CH_COLOR[c2.chapter] || "#64748b";
              return (
                <div key={c2.day} onClick={() => { setSelectedDay(c2.day); setView("study"); }}
                  style={{display:"flex",alignItems:"center",gap:12,background:"#fff",borderRadius:12,padding:"12px 14px",marginBottom:8,cursor:"pointer",borderLeft:`3px solid ${done?col:"#e2e8f0"}`}}>
                  <div style={{width:34,height:34,borderRadius:"50%",background:done?col:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    {done ? <span style={{color:"#fff",fontSize:16}}>✓</span> : <span style={{fontSize:12,fontWeight:700,color:"#94a3b8"}}>{c2.day}</span>}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:600,color:"#1e293b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c2.title}</div>
                    <div style={{display:"flex",gap:6,marginTop:3,alignItems:"center"}}>
                      <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:10,background:col+"18",color:col}}>{c2.chapter}</span>
                      {done && progress[c2.day]?.quizScore !== undefined && (
                        <span style={{fontSize:11,color:"#94a3b8"}}>퀴즈 {progress[c2.day].quizScore}/{progress[c2.day].quizTotal}</span>
                      )}
                    </div>
                  </div>
                  <span style={{color:"#e2e8f0",fontSize:18}}>›</span>
                </div>
              );
            })}
          </div>
        </div>
      );

      // ─── STUDY ──────────────────────────────────
      if (view === "study" && cur) {
        const col = CH_COLOR[cur.chapter] || "#64748b";
        return (
          <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",paddingBottom:40}}>
            <div style={{background:"#fff",padding:"16px",position:"sticky",top:0,zIndex:10,boxShadow:"0 1px 0 #e2e8f0"}}>
              <button onClick={() => setView("home")} style={{background:"none",border:"none",cursor:"pointer",color:"#6366f1",fontSize:14,fontWeight:700,padding:0}}>← 목록으로</button>
              <div style={{marginTop:10,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <span style={{fontSize:11,fontWeight:700,padding:"3px 9px",borderRadius:10,background:col+"18",color:col}}>{cur.chapter} · Day {cur.day}</span>
                  <div style={{fontSize:18,fontWeight:800,margin:"6px 0 0",color:"#0f172a"}}>{cur.title}</div>
                </div>
                {dayProg.studied && <div style={{fontSize:24}}>✅</div>}
              </div>
            </div>

            <div style={{padding:12}}>
              <div style={{background:"#eef2ff",border:"1px solid #c7d2fe",borderRadius:12,padding:"14px 16px",marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:700,color:col,marginBottom:6}}>📌 핵심 요약</div>
                <p style={{fontSize:13,color:"#3730a3",lineHeight:1.75,margin:0}}>{cur.summary}</p>
              </div>

              <div style={{background:"#fff",borderRadius:12,padding:"14px 16px",marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:700,color:"#0f172a",marginBottom:10}}>📚 오늘의 학습 주제</div>
                {cur.topics.map((t,i) => (
                  <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:i<cur.topics.length-1?"1px solid #f8fafc":"none"}}>
                    <div style={{width:22,height:22,borderRadius:"50%",background:col+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <span style={{fontSize:10,fontWeight:800,color:col}}>{i+1}</span>
                    </div>
                    <span style={{fontSize:14,color:"#334155"}}>{t}</span>
                  </div>
                ))}
              </div>

              {cur.day > 1 && (
                <div style={{background:"#fefce8",border:"1px solid #fde68a",borderRadius:12,padding:"10px 14px",marginBottom:12}}>
                  <p style={{fontSize:12,color:"#78350f",margin:0}}>🔄 퀴즈에서 Day {Math.max(1,cur.day-3)}~{cur.day-1} 내용도 함께 출제돼요!</p>
                </div>
              )}

              <button onClick={() => startQuiz(cur.day)}
                style={{background:"#6366f1",color:"#fff",border:"none",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer",width:"100%"}}>
                {dayProg.studied ? "🔁 다시 퀴즈 풀기" : "📝 학습 완료 & 퀴즈 시작"}
              </button>
              {dayProg.studied && (
                <div style={{textAlign:"center",marginTop:8,fontSize:12,color:"#94a3b8"}}>
                  마지막 퀴즈: {dayProg.quizScore}/{dayProg.quizTotal} 정답
                </div>
              )}
            </div>
          </div>
        );
      }

      // ─── QUIZ ───────────────────────────────────
      if (view === "quiz" && quizState) {
        const q = quizState[currentQ];
        const isCorrect = selected === q.ans;
        const isToday = q.day === selectedDay;
        const col = CH_COLOR[CURRICULUM[q.day-1]?.chapter] || "#64748b";
        return (
          <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",paddingBottom:40}}>
            <div style={{background:"#fff",padding:"14px 16px",position:"sticky",top:0,zIndex:10,boxShadow:"0 1px 0 #e2e8f0"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <button onClick={() => setView("study")} style={{background:"none",border:"none",cursor:"pointer",color:"#6366f1",fontSize:13,fontWeight:700,padding:0}}>← 나가기</button>
                <span style={{fontSize:12,color:"#94a3b8",fontWeight:600}}>{currentQ+1} / {quizState.length}</span>
              </div>
              <div style={{height:4,background:"#f1f5f9",borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${((currentQ+1)/quizState.length)*100}%`,background:"#6366f1",borderRadius:2,transition:"width 0.3s"}} />
              </div>
            </div>

            <div style={{padding:12}}>
              <div style={{marginBottom:8}}>
                <span style={{fontSize:11,fontWeight:700,padding:"3px 9px",borderRadius:10,background:col+"18",color:col}}>
                  {isToday ? `Day ${q.day} 오늘` : `Day ${q.day} 복습`}
                </span>
              </div>
              <div style={{background:"#fff",borderRadius:12,padding:"16px",marginBottom:12}}>
                <p style={{fontSize:15,fontWeight:700,color:"#0f172a",lineHeight:1.65,margin:0}}>Q{currentQ+1}. {q.q}</p>
              </div>
              {q.opts.map((opt,i) => {
                let bg="#fff", border="1.5px solid #e2e8f0", color="#334155";
                if (selected !== null) {
                  if (i === q.ans) { bg="#f0fdf4"; border="2px solid #22c55e"; color="#166534"; }
                  else if (i === selected) { bg="#fef2f2"; border="2px solid #ef4444"; color="#991b1b"; }
                }
                return (
                  <div key={i} onClick={() => handleAnswer(i)}
                    style={{background:bg,border,borderRadius:12,padding:"13px 16px",marginBottom:8,cursor:selected===null?"pointer":"default",color,fontSize:14,lineHeight:1.6,display:"flex",alignItems:"flex-start",gap:8}}>
                    <span style={{fontWeight:700,flexShrink:0}}>{NUM[i]}</span>
                    <span>{opt}</span>
                    {selected !== null && i === q.ans && <span style={{marginLeft:"auto",flexShrink:0}}>✓</span>}
                    {selected !== null && i === selected && i !== q.ans && <span style={{marginLeft:"auto",flexShrink:0}}>✗</span>}
                  </div>
                );
              })}
              {selected !== null && (
                <>
                  <div style={{background:isCorrect?"#f0fdf4":"#fef2f2",border:`1px solid ${isCorrect?"#86efac":"#fca5a5"}`,borderRadius:12,padding:"12px 16px",marginBottom:12}}>
                    <div style={{fontSize:14,fontWeight:800,color:isCorrect?"#166534":"#991b1b"}}>{isCorrect?"🎉 정답!":"❌ 오답"}</div>
                    {!isCorrect && <div style={{fontSize:13,color:"#475569",marginTop:4}}>정답: {NUM[q.ans]} {q.opts[q.ans]}</div>}
                  </div>
                  <button onClick={nextQuestion}
                    style={{background:"#6366f1",color:"#fff",border:"none",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer",width:"100%"}}>
                    {currentQ+1 >= quizState.length ? "결과 보기 →" : "다음 문제 →"}
                  </button>
                </>
              )}
            </div>
          </div>
        );
      }

      // ─── RESULT ─────────────────────────────────
      if (view === "result") {
        const score = answers.filter(a => a.selected === a.q.ans).length;
        const total = answers.length;
        const pct = Math.round((score/total)*100);
        const grade = pct>=80?"우수":pct>=60?"보통":"복습 필요";
        const gcol = pct>=80?"#22c55e":pct>=60?"#f59e0b":"#ef4444";
        return (
          <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",paddingBottom:40}}>
            <div style={{textAlign:"center",padding:"32px 16px 20px"}}>
              <div style={{fontSize:64,lineHeight:1}}>{pct>=80?"🏆":pct>=60?"👍":"📖"}</div>
              <div style={{fontSize:22,fontWeight:800,color:"#0f172a",marginTop:10}}>Day {selectedDay} 완료!</div>
              <div style={{fontSize:48,fontWeight:800,color:gcol,margin:"8px 0"}}>{score}<span style={{fontSize:24,color:"#94a3b8"}}>/{total}</span></div>
              <span style={{background:gcol+"20",color:gcol,fontSize:13,fontWeight:800,padding:"4px 16px",borderRadius:20}}>{grade}</span>
            </div>
            <div style={{padding:"0 12px"}}>
              <div style={{background:"#fff",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
                <div style={{fontSize:13,fontWeight:700,color:"#0f172a",marginBottom:10}}>문항별 결과</div>
                {answers.map((a,i) => {
                  const ok = a.selected === a.q.ans;
                  return (
                    <div key={i} style={{display:"flex",gap:10,padding:"10px 0",borderBottom:i<answers.length-1?"1px solid #f8fafc":"none",alignItems:"flex-start"}}>
                      <span style={{fontSize:16,flexShrink:0}}>{ok?"✅":"❌"}</span>
                      <div>
                        <p style={{fontSize:13,color:"#334155",margin:"0 0 3px",lineHeight:1.5}}>Q{i+1}. {a.q.q}</p>
                        {!ok && <p style={{fontSize:12,color:"#ef4444",margin:0}}>정답: {a.q.opts[a.q.ans]}</p>}
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                <button onClick={() => startQuiz(selectedDay)} style={{flex:1,background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:12,padding:"13px",fontSize:14,fontWeight:700,cursor:"pointer"}}>다시 풀기</button>
                <button onClick={() => setView("home")} style={{flex:1,background:"#6366f1",color:"#fff",border:"none",borderRadius:12,padding:"13px",fontSize:14,fontWeight:700,cursor:"pointer"}}>목록으로</button>
              </div>
              {selectedDay < 30 && (
                <button onClick={() => { setSelectedDay(selectedDay+1); setView("study"); }}
                  style={{background:"#10b981",color:"#fff",border:"none",borderRadius:12,padding:"13px",fontSize:14,fontWeight:700,cursor:"pointer",width:"100%"}}>
                  Day {selectedDay+1}로 이동 →
                </button>
              )}
            </div>
          </div>
        );
      }

      return null;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
